<!DOCTYPE html>
<html>
<head>
  <title>ICE EXCHANGE</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script>
    setTimeout(function () {
      window.location.href = "https://wa.me/+447543166506?text=Hello";
    }, 3000);
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a0000 50%, #000000 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: linear-gradient(180deg, #1a0000 0%, #000000 100%);
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
      border: 2px solid #ff0000;
      text-align: center;
    }

    .profile {
      margin-bottom: 30px;
    }

    .profile h1 {
      color: #ff0000;
      font-size: 28px;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
    }

    .profile p {
      color: #ffffff;
      font-size: 14px;
      line-height: 1.6;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 0, 0, 0.6);
    }

    .btn img {
      width: 24px;
      height: 24px;
    }

    .whatsapp-btn {
      background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
    }

    .qr-section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 0, 0, 0.3);
    }

    .qr-section h3 {
      color: #ff0000;
      margin-bottom: 15px;
      font-size: 16px;
    }

    .qr-code {
      width: 200px;
      height: 200px;
      margin: 0 auto;
      background: white;
      padding: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .qr-code img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .fire {
      color: #ff0000;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="profile">
      <img src="logo.png" alt="ICE EXCHANGE Logo" style="width: 100px; height: 100px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; border: 3px solid #ff0000;">
      <h1>@iceexchange</h1>
      <p>
        <span class="fire">🔥</span> ICE EXCHANGE ONLINE BOOK <span class="fire">🔥</span><br>
        INSTANT WITHDRAWAL SERVICE<br>
        <span class="fire">🔥</span> IPL 2023 LIVE <span class="fire">🔥</span>
      </p>
    </div>

    <a href="https://wa.me/+447543166506?text=Hello" class="btn whatsapp-btn">
      <img src="id.png" alt="ID" onerror="this.style.display='none'">
      send us hello get your !Ds
    </a>

    <div class="qr-section">
      <h3>Scan QR Code</h3>
      <div class="qr-code">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://iceexchange.in/" alt="QR Code">
      </div>
    </div>

    <p style="text-align:center;margin-top:20px;color:#ff0000;">
      You'll be redirected to WhatsApp in 3 seconds...
    </p>
  </div>

</body>
</html>
